# nginx.conf  --  docker-openresty
#
# This file is installed to:
#   `/usr/local/openresty/nginx/conf/nginx.conf`
# and is the file loaded by nginx at startup,
# unless the user specifies otherwise.
#
# It tracks the upstream OpenResty's `nginx.conf`, but removes the `server`
# section and adds this directive:
#     `include /etc/nginx/conf.d/*.conf;`
#
# The `docker-openresty` file `nginx.vh.default.conf` is copied to
# `/etc/nginx/conf.d/default.conf`.  It contains the `server section
# of the upstream `nginx.conf`.
#
# See https://github.com/openresty/docker-openresty/blob/master/README.md#nginx-config-files
#

#user  nobody;
#worker_processes 1;

# Enables the use of JIT for regular expressions to speed-up their processing.
pcre_jit on;


error_log /dev/stderr info;
#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;



worker_processes  1;

events {
    worker_connections 1024;
}

http {
    lua_shared_dict metrics 10m;
	
	resolver 127.0.0.11 ipv6=off;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
	
	init_worker_by_lua_block {
		math.randomseed(ngx.time() + ngx.worker.pid())
		math.random()
		math.random()
		math.random()
	}

    upstream backend_a {
        server backend-a:80;
    }

    upstream backend_b {
        server backend-b:80;
    }
	
	upstream backend_echo {
		server backend-echo:80;
	}
	
	upstream slow_backend {
		server slow-backend:80;
	}
	
	upstream retry_failover_pool {
		server slow-backend:80;
		server backend-echo:80;
	}

    server {
        listen 8080;
        server_name localhost;
		
        location = /health {
			default_type application/json;
			return 200 '{"status":"ok"}';
		}

		
		location = /metrics {
			content_by_lua_block {
				ngx.ctx.route = "metrics"
				local metrics = require("plugins.metrics")
				metrics.prometheus_output()
			}
		}

		location = /metrics/reset {
			content_by_lua_block {
				ngx.ctx.route = "metrics_reset"
				local metrics = require("plugins.metrics")
				metrics.reset()
			}
		}

		location = /svc/a {
			access_by_lua_block {
				ngx.ctx.route = "svc_a"
				local runner = require("plugin_runner")
				runner.run_access()
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass http://backend_a/;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		location = /svc/a-weighted {
			set $target_upstream "";

			access_by_lua_block {
				ngx.ctx.route = "svc_a_weighted"
				local runner = require("plugin_runner")
				runner.run_access()

				ngx.var.target_upstream = "http://" .. ngx.ctx.selected_upstream .. "/"
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass $target_upstream;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}

		location = /svc/a-canary {
			set $target_upstream "";

			access_by_lua_block {
				ngx.ctx.route = "svc_a_canary"
				local runner = require("plugin_runner")
				runner.run_access()

				ngx.var.target_upstream = "http://" .. ngx.ctx.selected_upstream .. "/"
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass $target_upstream;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		location = /svc/a-canary-pct {
			set $target_upstream "";

			access_by_lua_block {
				ngx.ctx.route = "svc_a_canary_pct"
				local runner = require("plugin_runner")
				runner.run_access()

				ngx.var.target_upstream = "http://" .. ngx.ctx.selected_upstream .. "/"
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass $target_upstream;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		location = /svc/a-canary-hybrid {
			set $target_upstream "";

			access_by_lua_block {
				ngx.ctx.route = "svc_a_canary_hybrid"
				local runner = require("plugin_runner")
				runner.run_access()

				ngx.var.target_upstream = "http://" .. ngx.ctx.selected_upstream .. "/"
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass $target_upstream;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		location = /svc/a-bluegreen {
			set $target_upstream "";

			access_by_lua_block {
				ngx.ctx.route = "svc_a_bluegreen"
				local runner = require("plugin_runner")
				runner.run_access()

				ngx.var.target_upstream = "http://" .. ngx.ctx.selected_upstream .. "/"
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass $target_upstream;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		
		location = /svc/a-shadow {
			set $target_upstream "";

			access_by_lua_block {
				ngx.ctx.route = "svc_a_shadow"
				local runner = require("plugin_runner")
				runner.run_access()

				ngx.var.target_upstream = "http://" .. ngx.ctx.selected_upstream .. "/"
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass $target_upstream;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}


		
		location = /svc/b {
			access_by_lua_block {
				ngx.ctx.route = "svc_b"
				local runner = require("plugin_runner")
				runner.run_access()
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_pass http://backend_b/;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		location /slow {
			echo_sleep 5;
			echo "slow response finished";
		}
		
		location = /svc/slow {
			access_by_lua_block {
				ngx.ctx.route = "svc_slow"
				local runner = require("plugin_runner")
				runner.run_access()
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;
			
			proxy_next_upstream error timeout http_502 http_503 http_504;
			proxy_next_upstream_tries 2;

			proxy_pass http://slow_backend/slow;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		
		location = /svc/failover {
			set $failover_target "";

			access_by_lua_block {
				ngx.ctx.route = "svc_failover"
				local runner = require("plugin_runner")
				runner.run_access()

				if ngx.ctx.cb_force_fallback then
					ngx.var.failover_target = "http://backend_echo/"
				else
					ngx.var.failover_target = "http://slow_backend/slow"
				end
			}

			proxy_connect_timeout 1000ms;
			proxy_send_timeout 1000ms;
			proxy_read_timeout 2000ms;

			proxy_next_upstream error timeout http_502 http_503 http_504;
			proxy_next_upstream_tries 2;

			proxy_pass $failover_target;

			header_filter_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_header_filter()
			}

			log_by_lua_block {
				local runner = require("plugin_runner")
				runner.run_log()
			}
		}
		
		
		
    }
}

include /etc/nginx/conf.d/*.main;
